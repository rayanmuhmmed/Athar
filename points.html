:root{
  --bg:#f0f4f8;--surface:#fff;--border:#e8ecf0;--text:#1a1a1a;--muted:#6b7280;

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);font-family:"Tajawal",sans-serif;color:var(--text);min-height:100vh;direction:rtl;}
header{background:var(--surface);border-bottom:1.5px solid var(--border);padding:10px 16px;position:sticky;top:0;z-index:30;height:60px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;color:var(--teal);font-size:14px;font-weight:700;font-family:"Cairo",sans-serif;}
.back-btn svg{width:20px;height:20px;}
.h-title{font-size:17px;font-weight:900;font-family:"Cairo",sans-serif;}
.h-logo{height:36px;object-fit:contain;}
.ls{position:fixed;inset:0;background:#f7f8f8;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:16px;transition:opacity .4s;}
.ls.hide{opacity:0;pointer-events:none;}

@keyframes fillUp{to{clip-path:inset(0 0 0 0);}}
.ll-dots{display:flex;gap:8px;}
.ll-dots span{width:8px;height:8px;border-radius:50%;background:var(--teal);opacity:.3;animation:dp 1.2s ease-in-out infinite;}
.ll-dots span:nth-child(2){animation-delay:.2s;}
.ll-dots span:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,100%{opacity:.25;transform:scale(.8);}50%{opacity:1;transform:scale(1.2);}}
main{padding:16px 16px 100px;max-width:600px;margin:0 auto;}
.podium-wrap{background:linear-gradient(135deg,#1e8a8a,#0d5f5f);border-radius:24px;padding:24px 16px 28px;margin-bottom:20px;overflow:hidden;position:relative;}
.podium-title{color:rgba(255,255,255,0.7);font-size:12px;font-weight:700;text-align:center;margin-bottom:20px;letter-spacing:1px;}
.podium-row{display:flex;align-items:flex-end;justify-content:center;gap:10px;}
.podium-item{display:flex;flex-direction:column;align-items:center;flex:1;max-width:110px;}
.p-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;font-family:"Cairo",sans-serif;color:#fff;margin-bottom:6px;border:3px solid rgba(255,255,255,0.3);}
.p-avatar.r1{background:linear-gradient(135deg,#e74c3c,#c0392b);width:62px;height:62px;font-size:22px;}
.p-avatar.r2{background:linear-gradient(135deg,#95a5a6,#7f8c8d);}
.p-avatar.r3{background:linear-gradient(135deg,#cd7f32,#a0522d);}
.p-name{color:#fff;font-size:12px;font-weight:700;font-family:"Cairo",sans-serif;text-align:center;margin-bottom:4px;}
.p-pts{color:rgba(255,255,255,0.9);font-size:14px;font-weight:900;font-family:"Cairo",sans-serif;margin-bottom:6px;}
.p-base{width:100%;border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:rgba(255,255,255,0.5);}
.p-base.r1{height:60px;background:rgba(255,215,0,0.2);}
.p-base.r2{height:44px;background:rgba(255,255,255,0.12);}
.p-base.r3{height:32px;background:rgba(255,255,255,0.08);}
.sec-label{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.sec-label::before{content:"";width:3px;height:14px;background:var(--teal);border-radius:2px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.s-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:box-shadow .15s;}
.s-card.absent{opacity:.55;cursor:default;}
.s-card:not(.absent):active{box-shadow:0 0 0 2px var(--teal);}
.rank-b{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;font-family:"Cairo",sans-serif;flex-shrink:0;color:#fff;}
.rank-b.r1{background:linear-gradient(135deg,#f1c40f,#e67e22);}
.rank-b.r2{background:linear-gradient(135deg,#95a5a6,#7f8c8d);}
.rank-b.r3{background:linear-gradient(135deg,#cd7f32,#a0522d);}
.rank-b.rn{background:var(--bg);color:var(--muted);}
.s-av{width:42px;height:42px;border-radius:12px;background:var(--teal-bg);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;font-family:"Cairo",sans-serif;color:var(--teal);flex-shrink:0;}
.s-info{flex:1;}
.s-name{font-size:15px;font-weight:700;font-family:"Cairo",sans-serif;}
.s-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.pts-badge{background:var(--gold-bg);border:1px solid var(--gold-bd);border-radius:12px;padding:6px 12px;text-align:center;flex-shrink:0;}
.pts-num{font-size:18px;font-weight:900;font-family:"Cairo",sans-serif;color:var(--gold);display:block;line-height:1;}
.pts-lbl{font-size:10px;color:var(--muted);}
.add-btn{width:34px;height:34px;border-radius:10px;background:var(--teal-bg);border:1.5px solid rgba(30,138,138,0.2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--teal);flex-shrink:0;}
.add-btn svg{width:16px;height:16px;}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:60;align-items:flex-end;justify-content:center;}
.modal-ov.open{display:flex;}
.modal-box{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:600px;padding:20px 18px 40px;animation:su .3s ease;}
@keyframes su{from{transform:translateY(100%);}to{transform:translateY(0);}}
.mh{width:38px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px;}
.m-info{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg);border-radius:14px;margin-bottom:18px;}
.m-av{width:46px;height:46px;border-radius:12px;background:var(--teal-bg);display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:900;font-family:"Cairo",sans-serif;color:var(--teal);}
.m-name{font-size:16px;font-weight:800;font-family:"Cairo",sans-serif;}
.m-cur{font-size:13px;color:var(--muted);margin-top:2px;}
.m-lbl{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px;}
.pts-row{display:flex;gap:8px;margin-bottom:16px;}
.p-btn{flex:1;padding:13px 8px;border:1.5px solid var(--border);border-radius:12px;background:var(--bg);font-size:16px;font-weight:900;font-family:"Cairo",sans-serif;cursor:pointer;color:var(--text);}
.p-btn.sel{background:var(--gold);border-color:var(--gold);color:#fff;}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.t-btn{padding:12px 8px;border:1.5px solid var(--border);border-radius:12px;background:var(--bg);font-size:13px;font-weight:700;font-family:"Tajawal",sans-serif;cursor:pointer;color:var(--muted);text-align:center;}
.t-btn.sel{background:var(--teal-bg);border-color:var(--teal);color:var(--teal);}
.btn-ok{width:100%;padding:15px;border:none;border-radius:14px;background:var(--teal);color:#fff;font-size:16px;font-weight:800;font-family:"Cairo",sans-serif;cursor:pointer;}
.btn-cl{width:100%;padding:13px;border:1.5px solid var(--border);border-radius:14px;background:none;color:var(--muted);font-size:15px;font-weight:700;font-family:"Cairo",sans-serif;cursor:pointer;margin-top:8px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;color:#fff;padding:12px 22px;border-radius:14px;font-size:14px;font-weight:700;z-index:100;opacity:0;transition:all .3s;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty p{font-size:15px;font-weight:600;margin-top:12px;}
</style>

var students=[],todayPresent={},totalPts={},todayPts={},clubId=null,selSt=null,pVal=15,tVal="اختبار الذاكرة";

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function key(id){return String(id);}
function todayStr(){return new Date().toISOString().slice(0,10);}
function showToast(m){
  // أظهر alert للتشخيص مؤقتاً
  var t=document.getElementById("toast");
  t.textContent=m;
  t.style.zIndex="9999";
  t.style.opacity="1";
  t.style.transform="translateX(-50%) translateY(0)";
  t.style.display="block";
  clearTimeout(window._t);
  window._t=setTimeout(function(){t.style.opacity="0";},3000);
}
function hideLS(){var e=document.getElementById("ls");if(e){e.classList.add("hide");setTimeout(function(){e.style.display="none";},400);}}

// Safety timeout - 2 ثواني للاختبار
setTimeout(function(){hideLS();},2000);

function init(){
  showToast("جاري تحميل البيانات...");
  SB.auth.getSession().then(function(r){
    if(!r.data||!r.data.session){
      showToast("❌ لا يوجد جلسة - إعادة توجيه");
      window.location.replace("login.html"); return;
    }
    var uid=r.data.session.user.id;
    showToast("✓ جلسة موجودة");
    SB.from("supervisors").select("club_id").eq("user_id",uid).maybeSingle()
    .then(function(s){
      if(s.error){ showToast("❌ خطأ supervisors: "+s.error.message); hideLS(); return; }
      if(s.data&&s.data.club_id){
        clubId=s.data.club_id;
        showToast("✓ clubId: "+clubId.slice(0,8));
      } else {
        var sid=sessionStorage.getItem("adminClubId");
        if(sid){ clubId=sid; showToast("✓ adminClub: "+sid.slice(0,8)); }
        else { showToast("❌ لا يوجد clubId"); hideLS(); return; }
      }
      loadStudents();
    }).catch(function(e){ showToast("❌ catch: "+e.message); hideLS(); });
  }).catch(function(e){ showToast("❌ session: "+e.message); hideLS(); });
}

function loadStudents(){
  showToast("جاري جلب الطلاب...");
  SB.from("students").select("id,name").eq("club_id",clubId).order("name")
  .then(function(r){
    if(r.error){ showToast("❌ students: "+r.error.message); hideLS(); return; }
    showToast("✓ طلاب: "+r.data.length);
    students=r.data||[];
    loadData();
  }).catch(function(e){ showToast("❌ students: "+e.message); hideLS(); });
}

function loadStudents(){
  console.log("loadStudents, clubId:", clubId);
  SB.from("students").select("id,name").eq("club_id",clubId).order("name")
  .then(function(r){
    console.log("students:", r.data&&r.data.length, "error:", r.error);
    students=r.data||[];
    loadData();
  }).catch(function(e){console.error("students catch:",e);hideLS();});
}



function loadData(){
  showToast("جاري جلب النقاط...");
  var a1=SB.from("attendance_records").select("student_id,status").eq("date",todayStr()).eq("club_id",clubId).then(function(r){if(r.error)showToast("⚠️ att: "+r.error.message);return r.data||[];}).catch(function(e){showToast("⚠️ att catch: "+e.message);return[];});
  var a2=SB.from("points").select("student_id,points,date").eq("club_id",clubId).then(function(r){if(r.error)showToast("⚠️ pts: "+r.error.message);return r.data||[];}).catch(function(e){showToast("⚠️ pts catch: "+e.message);return[];});
  Promise.all([a1,a2]).then(function(res){
    showToast("✓ تم التحميل");
    todayPresent={};
    (res[0]).forEach(function(r){if(r.status==="present")todayPresent[key(r.student_id)]=true;});
    totalPts={};todayPts={};
    (res[1]).forEach(function(p){
      var k=key(p.student_id);
      totalPts[k]=(totalPts[k]||0)+p.points;
      if(p.date===todayStr()) todayPts[k]=(todayPts[k]||0)+p.points;
    });
    hideLS();
    render();
    startRT();
  }).catch(function(){hideLS();render();});
}

function render(){
  var sorted=students.slice().sort(function(a,b){return(totalPts[key(b.id)]||0)-(totalPts[key(a.id)]||0);});
  renderPodium(sorted);
  renderList(sorted);
}

function renderPodium(sorted){
  var top=sorted.filter(function(s){return(totalPts[key(s.id)]||0)>0;}).slice(0,3);
  var pw=document.getElementById("podiumWrap");
  if(!top.length){pw.style.display="none";return;}
  pw.style.display="block";
  var order=top.length>=2?[top[1],top[0],top[2]].filter(Boolean):[top[0]];
  var ranks=top.length>=2?[2,1,3]:[1];
  document.getElementById("podiumRow").innerHTML=order.map(function(s,i){
    var rk=ranks[i],pts=totalPts[key(s.id)]||0;
    return '<div class="podium-item">'
      +'<div class="p-avatar r'+rk+'">'+esc(s.name.charAt(0))+(rk===1?' 👑':'')+'</div>'
      +'<p class="p-name">'+esc(s.name.split(" ")[0])+'</p>'
      +'<p class="p-pts">'+pts+' ⭐</p>'
      +'<div class="p-base r'+rk+'">'+rk+'</div>'
      +'</div>';
  }).join("");
}

function renderList(sorted){
  var el=document.getElementById("list");
  if(!sorted.length){el.innerHTML='<div class="empty"><p>لا يوجد طلاب</p></div>';return;}
  el.innerHTML=sorted.map(function(s,i){
    var rk=i+1,pts=totalPts[key(s.id)]||0,tps=todayPts[key(s.id)]||0;
    var pres=todayPresent[key(s.id)];
    var rc=rk<=3?"r"+rk:"rn";
    return '<div class="s-card'+(pres?'':' absent')+'" onclick="'+(pres?'openM("'+key(s.id)+'","'+esc(s.name)+'",'+pts+')':'')+'"">'
      +'<div class="rank-b '+rc+'">'+rk+'</div>'
      +'<div class="s-av">'+esc(s.name.charAt(0))+'</div>'
      +'<div class="s-info">'
      +'<p class="s-name">'+esc(s.name)+'</p>'
      +'<p class="s-sub">'
      +(tps>0?'<span style="color:var(--gold);font-weight:700;">+'+tps+' اليوم</span> • ':'')
      +(pres?'<span style="color:var(--green);">حاضر ✓</span>':'غير حاضر')
      +'</p></div>'
      +'<div class="pts-badge"><span class="pts-num">'+pts+'</span><span class="pts-lbl">نقطة</span></div>'
      +(pres?'<button class="add-btn" onclick="event.stopPropagation();openM(''+key(s.id)+'',''+esc(s.name)+'','+pts+')">'
        +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>'
        +'</button>':'')
      +'</div>';
  }).join("");
}

function openM(sid,name,cur){
  selSt={id:sid,name:name,total:cur};
  document.getElementById("mAv").textContent=name.charAt(0);
  document.getElementById("mName").textContent=name;
  document.getElementById("mTotal").textContent=cur;
  document.getElementById("modal").classList.add("open");
}
function closeM(){document.getElementById("modal").classList.remove("open");}
document.getElementById("modal").onclick=function(e){if(e.target===this)closeM();};

function selP(b){document.querySelectorAll(".p-btn").forEach(function(x){x.classList.remove("sel");});b.classList.add("sel");pVal=parseInt(b.dataset.v);}
function selT(b){document.querySelectorAll(".t-btn").forEach(function(x){x.classList.remove("sel");});b.classList.add("sel");tVal=b.dataset.t;}

document.getElementById("btnOk").onclick=function(){
  if(!selSt||!clubId)return;
  var btn=this;btn.disabled=true;btn.textContent="جاري...";
  SB.from("points").insert({student_id:selSt.id,club_id:clubId,points:pVal,type:tVal,reason:tVal,date:todayStr()})
  .then(function(r){
    btn.disabled=false;btn.textContent="إضافة النقاط";
    if(r.error){showToast("خطأ: "+r.error.message);return;}
    closeM();
    showToast("✓ +"+pVal+" نقطة لـ "+selSt.name);
    var k=key(selSt.id);
    totalPts[k]=(totalPts[k]||0)+pVal;
    todayPts[k]=(todayPts[k]||0)+pVal;
    render();
  });
};

function startRT(){
  SB.channel("pts-ch")
  .on("postgres_changes",{event:"*",schema:"public",table:"attendance_records"},function(p){
    var r=p.new||{};
    if(r.club_id===clubId&&r.date===todayStr()){
      if(r.status==="present")todayPresent[key(r.student_id)]=true;
      else delete todayPresent[key(r.student_id)];
      render();
    }
    if(p.eventType==="DELETE") delete todayPresent[key((p.old||{}).student_id)];
  })
  .on("postgres_changes",{event:"INSERT",schema:"public",table:"points"},function(p){
    var r=p.new||{};
    if(r.club_id===clubId){
      var k=key(r.student_id);
      totalPts[k]=(totalPts[k]||0)+r.points;
      if(r.date===todayStr()) todayPts[k]=(todayPts[k]||0)+r.points;
      render();
    }
  })
  .on("postgres_changes",{event:"DELETE",schema:"public",table:"points"},function(){
    loadData();
  })
  .subscribe();
}

init();
</script>
</body>
</html>

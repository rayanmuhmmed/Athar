<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>منصة أثر — التحضير</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;800;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>

:root{
  --bg:#f7f8f8; --surface:#fff; --border:#e5e7eb;
  --text:#1a1a1a; --muted:#6b7280; --brand:#1e8a8a;
  --present-bg:#e6f4e6; --present-text:#2d5c2d; --present-border:#b8d8b8;
  --late-bg:#e0f5f3;    --late-text:#226058;    --late-border:#b0d8d4;
  --excused-bg:#fef9e0; --excused-text:#7a6a1a; --excused-border:#e8d890;
  --absent-bg:#faeae8;  --absent-text:#8c3020;  --absent-border:#eabab4;
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
body{ background:var(--bg); color:var(--text); font-family:"Tajawal","Tahoma",sans-serif; direction:rtl; }

/* ══ HEADER ══ */
header{
  background:var(--surface); border-bottom:1.5px solid var(--border);
  padding:10px 16px 8px; position:sticky; top:0; left:0; right:0; z-index:30;
  box-shadow:0 2px 12px rgba(0,0,0,0.04);
}
.header-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.header-logo{ height:38px; width:auto; object-fit:contain; }
.menu-btn{ background:none; border:none; cursor:pointer; padding:4px; color:var(--text); display:flex; }
.menu-btn svg{ width:24px; height:24px; }
.header-info{ display:flex; align-items:center; justify-content:space-between; }
.club-name{ font-size:16px; font-weight:800; font-family:"Cairo",sans-serif; }
.today-stat{ display:flex; align-items:center; gap:8px; }
.today-label{ font-size:13px; color:var(--muted); }
.today-badge{ background:var(--brand); color:#fff; border-radius:20px; padding:3px 12px; font-size:13px; font-weight:800; }
.date-label{ font-size:13px; color:var(--muted); margin-top:3px; }

/* ══ PILLS ══ */
.pills-bar{
  position:sticky; top:60px; left:0; right:0; background:var(--surface);
  border-bottom:1px solid var(--border); padding:8px 16px;
  display:flex; gap:8px; z-index:28; overflow-x:auto;
  -webkit-overflow-scrolling:touch; scrollbar-width:none;
}
.pills-bar::-webkit-scrollbar{ display:none; }
.pill{ border-radius:20px; padding:6px 14px; font-size:13px; font-weight:700; border:none; white-space:nowrap; flex-shrink:0; cursor:default; }
.pill.present{ background:var(--present-bg); color:var(--present-text); }
.pill.late{    background:var(--late-bg);    color:var(--late-text); }
.pill.excused{ background:var(--excused-bg); color:var(--excused-text); }
.pill.absent{  background:var(--absent-bg);  color:var(--absent-text); }

/* ══ MAIN ══ */
main{ padding:16px 16px 40px; }
.search-input{
  width:100%; padding:11px 16px; border-radius:20px;
  border:1.5px solid var(--border); background:var(--surface);
  font-size:14px; color:var(--text); font-family:"Tajawal",sans-serif;
  outline:none; margin-bottom:16px; transition:border-color .2s;
}
.search-input:focus{ border-color:var(--brand); }

/* ══ CARDS ══ */
.students-list{ display:flex; flex-direction:column; gap:14px; }
.student-card{ position:relative; overflow:hidden;
  background:var(--surface); border:1.5px solid var(--border);
  border-radius:16px; padding:18px 16px; cursor:pointer;
  transition:border-color .15s, background .15s;
  contain:content; /* أداء أفضل مع قوائم طويلة */
}
.student-card:active{ transform:scale(0.99); }

/* الحالة الافتراضية — اسم + دوائر */
.default-view{ text-align:center; }
.default-name{ font-size:17px; font-weight:700; font-family:"Cairo",sans-serif; margin-bottom:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
.circles-row{ display:flex; justify-content:center; gap:16px; }
.circle{
  width:48px; height:48px; border-radius:50%; border:2px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:15px; font-weight:800; color:var(--muted); background:transparent;
  transition:all .15s; cursor:pointer;
}
.circle:active{ transform:scale(0.88); }
/* ألوان كل دائرة */
.circle[data-status="present"]:hover,.circle[data-status="present"]:active{
  background:var(--present-bg);border-color:var(--present-border);color:var(--present-text);}
.circle[data-status="late"]:hover,.circle[data-status="late"]:active{
  background:var(--late-bg);border-color:var(--late-border);color:var(--late-text);}
.circle[data-status="excused"]:hover,.circle[data-status="excused"]:active{
  background:var(--excused-bg);border-color:var(--excused-border);color:var(--excused-text);}
.circle[data-status="absent"]:hover,.circle[data-status="absent"]:active{
  background:var(--absent-bg);border-color:var(--absent-border);color:var(--absent-text);}

/* الحالة المحددة — اسم + badge */
.selected-view{ display:none; align-items:center; justify-content:space-between; }
.selected-name{ font-size:17px; font-weight:700; font-family:"Cairo",sans-serif; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; margin-left:8px; }
.status-badge{
  width:38px; height:38px; min-width:38px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:15px; font-weight:800; cursor:pointer; border:2px solid transparent;
}

/* ألوان البطاقات */
.student-card.present{ background:var(--present-bg); border-color:var(--present-border); }
.student-card.late{    background:var(--late-bg);    border-color:var(--late-border); }
.student-card.excused{ background:var(--excused-bg); border-color:var(--excused-border); }
.student-card.absent{  background:var(--absent-bg);  border-color:var(--absent-border); }
.student-card.present .selected-name{ color:var(--present-text); }
.student-card.late    .selected-name{ color:var(--late-text); }
.student-card.excused .selected-name{ color:var(--excused-text); }
.student-card.absent  .selected-name{ color:var(--absent-text); }
.student-card.present .status-badge{ border-color:var(--present-border); color:var(--present-text); }
.student-card.late    .status-badge{ border-color:var(--late-border);    color:var(--late-text); }
.student-card.excused .status-badge{ border-color:var(--excused-border); color:var(--excused-text); }
.student-card.absent  .status-badge{ border-color:var(--absent-border);  color:var(--absent-text); }

/* ══ TOAST ══ */
.toast{
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(80px);
  background:#1a1a1a; color:#fff; border-radius:16px;
  padding:12px 22px; font-weight:700; font-size:14px;
  text-align:center; z-index:80; opacity:0;
  transition:all .3s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events:none; white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,0.25);
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
.early-ribbon{
  position:absolute; top:6px; left:8px;
  z-index:2; pointer-events:none;
}
.early-ribbon svg{ width:14px; height:14px; filter:drop-shadow(0 1px 2px rgba(201,154,46,0.4)); }

/* ══ OVERLAY & SIDE MENU ══ */
.overlay{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.3); z-index:40; }
.overlay.open{ display:block; }
.side-menu{
  position:fixed; top:0; right:-300px; width:280px; height:100%;
  background:var(--surface); z-index:50; transition:right .3s ease;
  border-left:1px solid var(--border); box-shadow:-4px 0 20px rgba(0,0,0,.08);
  overflow-y:auto;
}
.side-menu.open{ right:0; }
.side-header{
  background:#0d4a4a; padding:16px 18px;
  display:flex; align-items:center; justify-content:space-between;
}
.side-logo{ height:34px; filter:brightness(0) invert(1); }
.close-btn{ background:none; border:none; cursor:pointer; color:rgba(255,255,255,0.85); display:flex; }
.close-btn svg{ width:22px; height:22px; }
.side-supervisor{
  padding:14px 18px; border-bottom:1px solid var(--border);
  font-size:14px; color:var(--muted);
}
.side-supervisor strong{ display:block; font-size:15px; color:var(--text); margin-bottom:2px; }
.menu-section{ padding:10px 18px 4px; font-size:12px; color:var(--muted); font-weight:700; letter-spacing:.5px; }
.menu-item{
  display:flex; align-items:center; justify-content:space-between;
  width:100%; padding:14px 18px; background:none; border:none;
  border-bottom:1px solid var(--border); font-size:15px;
  font-family:"Tajawal",sans-serif; cursor:pointer; color:var(--text); text-align:right;
  text-decoration:none; transition:background .15s;
}
.menu-item:active{ background:rgba(30,138,138,0.06); }
.menu-item svg{ width:18px; height:18px; color:var(--muted); }
.menu-item-danger{ color:#dc2626; }
.menu-item-danger svg{ color:#dc2626; }
.empty-log{ padding:14px 18px; color:var(--muted); font-size:14px; }

/* ══ MODALS ══ */
.modal-overlay{
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.4);
  z-index:60; align-items:center; justify-content:center;
}
.modal-overlay.open{ display:flex; }
.modal-box{
  background:var(--surface); border-radius:20px; padding:24px;
  margin:20px; max-width:340px; width:100%;
}
.modal-box h3{ font-family:"Cairo",sans-serif; font-size:17px; font-weight:800; margin-bottom:16px; text-align:center; }
.modal-box p{ text-align:center; font-weight:600; font-size:15px; margin-bottom:20px; color:var(--muted); }
.modal-actions{ display:flex; gap:10px; }
.btn-confirm{ flex:1; padding:13px; border-radius:12px; border:none; background:#dc2626; color:#fff; font-weight:700; font-size:15px; cursor:pointer; font-family:"Tajawal",sans-serif; }
.btn-cancel{ flex:1; padding:13px; border-radius:12px; border:1.5px solid var(--border); background:var(--bg); color:var(--text); font-weight:700; font-size:15px; cursor:pointer; font-family:"Tajawal",sans-serif; }
.btn-primary{ flex:1; padding:13px; border-radius:12px; border:none; background:var(--brand); color:#fff; font-weight:700; font-size:15px; cursor:pointer; font-family:"Tajawal",sans-serif; }
.modal-input{
  width:100%; padding:12px 16px; border-radius:12px; border:1.5px solid var(--border);
  background:#f7f8f8; font-size:15px; font-family:"Tajawal",sans-serif;
  color:var(--text); outline:none; margin-bottom:16px; transition:border-color .2s;
}
.modal-input:focus{ border-color:var(--brand); background:#fff; }

/* تفاصيل يوم */
.day-detail-box{
  background:var(--surface); border-radius:20px; margin:20px;
  max-width:380px; width:100%; max-height:82vh; overflow-y:auto;
}
.day-detail-head{
  padding:16px 18px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; background:var(--surface); border-radius:20px 20px 0 0;
}
.day-detail-head span{ font-weight:800; font-size:15px; font-family:"Cairo",sans-serif; }
.day-detail-head button{ background:none; border:none; cursor:pointer; color:var(--muted); font-size:20px; }

/* تصدير */
.export-btn{
  flex:1; padding:12px; border-radius:12px; font-weight:700; font-size:14px;
  cursor:pointer; font-family:"Tajawal",sans-serif;
}

/* Loading */
.loading-screen{
  position:fixed; inset:0; background:#f7f8f8;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:200; gap:16px; transition:opacity .4s;
}
.loading-screen.hide{ opacity:0; pointer-events:none; }

  clip-path:inset(100% 0 0 0);
  animation:fillUp 1.8s cubic-bezier(0.4,0,0.2,1) forwards .2s;
}
@keyframes fillUp{ to{ clip-path:inset(0 0 0 0); } }
.ll-wave{
  position:absolute; bottom:0; left:0; right:0; height:7px;
  background:rgba(30,138,138,0.3); border-radius:0 0 75px 75px;
  animation:waveUp 1.8s cubic-bezier(0.4,0,0.2,1) forwards .2s;
}
@keyframes waveUp{ to{ bottom:145px; opacity:0; } }
.ll-dots{ display:flex; gap:8px; }
.ll-dots span{
  width:8px; height:8px; border-radius:50%; background:var(--brand); opacity:.3;
  animation:dp 1.2s ease-in-out infinite;
}
.ll-dots span:nth-child(2){ animation-delay:.2s; }
.ll-dots span:nth-child(3){ animation-delay:.4s; }
@keyframes dp{ 0%,100%{opacity:.25;transform:scale(.8);} 50%{opacity:1;transform:scale(1.2);} }

.empty-state{ text-align:center; padding:48px 20px; color:var(--muted); }
.empty-state svg{ width:52px; height:52px; opacity:.3; margin-bottom:14px; }
.empty-state p{ font-size:15px; font-weight:600; }


/* ══ EARLY ATTENDANCE BADGE ══ */
.early-badge{
  position:absolute; top:8px; left:8px;
  background:linear-gradient(135deg,#f59e0b,#d97706);
  color:#fff; font-size:10px; font-weight:800;
  padding:3px 8px; border-radius:20px;
  font-family:"Cairo",sans-serif; letter-spacing:.3px;
  box-shadow:0 2px 8px rgba(245,158,11,.35);
  pointer-events:none;
}
.student-card{ position:relative; }

/* ══ EARLY MODAL ══ */
.early-modal-box{
  background:var(--surface); border-radius:24px;
  padding:28px 24px; width:92%; max-width:360px;
  box-shadow:0 20px 60px rgba(0,0,0,.18);
  display:flex; flex-direction:column; gap:20px;
}
.early-modal-box h3{
  font-family:"Cairo",sans-serif; font-size:18px;
  font-weight:800; text-align:center; margin:0;
  color:var(--text);
}
.early-modal-box .em-label{
  font-size:13px; font-weight:700; color:var(--muted);
  margin-bottom:6px; display:block;
}
.early-time-input{
  width:100%; padding:12px 16px; border-radius:14px;
  border:1.5px solid var(--border); background:var(--surface);
  font-size:16px; font-family:"Cairo",sans-serif;
  color:var(--text); outline:none; text-align:center;
  transition:border-color .15s;
}
.early-time-input:focus{ border-color:var(--brand); }
.early-pts-row{
  display:flex; gap:10px; justify-content:center;
}
.early-pt-btn{
  flex:1; padding:14px 0; border-radius:14px;
  border:2px solid var(--border); background:transparent;
  font-size:16px; font-weight:800; font-family:"Cairo",sans-serif;
  color:var(--muted); cursor:pointer; transition:all .15s;
}
.early-pt-btn.selected{
  background:linear-gradient(135deg,#f59e0b,#d97706);
  border-color:#f59e0b; color:#fff;
  box-shadow:0 4px 14px rgba(245,158,11,.35);
}
.early-confirm-btn{
  width:100%; padding:16px; border-radius:14px;
  background:linear-gradient(135deg,#1e8a8a,#0d5f5f);
  color:#fff; border:none; font-size:16px; font-weight:800;
  font-family:"Cairo",sans-serif; cursor:pointer;
  box-shadow:0 4px 14px rgba(30,138,138,.3);
  transition:opacity .15s;
}
.early-confirm-btn:active{ opacity:.85; }
.early-cancel-btn{
  width:100%; padding:14px; border-radius:14px;
  background:transparent; border:1.5px solid var(--border);
  color:var(--muted); font-size:15px; font-weight:700;
  font-family:"Cairo",sans-serif; cursor:pointer;
}


/* ══ CUSTOM TIME PICKER ══ */
.custom-time-picker{
  display:flex; align-items:center; justify-content:center;
  gap:8px; padding:12px 0; direction:ltr;
}
.time-col{
  display:flex; flex-direction:column; align-items:center; gap:6px;
}
.time-val{
  font-size:36px; font-weight:800; font-family:"Cairo",sans-serif;
  color:var(--text); min-width:64px; text-align:center;
  background:var(--bg); border-radius:14px; padding:8px 0;
  border:1.5px solid var(--border);
}
.time-sep{
  font-size:32px; font-weight:800; color:var(--brand);
  margin-bottom:4px; font-family:"Cairo",sans-serif;
}
.time-arrow{
  background:none; border:none; cursor:pointer;
  color:var(--muted); padding:4px; border-radius:8px;
  transition:color .15s, background .15s;
  display:flex; align-items:center; justify-content:center;
}
.time-arrow svg{ width:22px; height:22px; }
.time-arrow:active{ background:rgba(30,138,138,.1); color:var(--brand); }
.ampm-col{ display:flex; flex-direction:column; gap:6px; margin-right:4px; }
.ampm-btn{
  width:38px; padding:8px 0; border-radius:10px;
  border:1.5px solid var(--border); background:transparent;
  font-size:14px; font-weight:800; font-family:"Cairo",sans-serif;
  color:var(--muted); cursor:pointer; transition:all .15s;
}
.ampm-btn.selected{
  background:var(--brand); border-color:var(--brand); color:#fff;
}

</style>
</head>

<script>
var SB = supabase.createClient("https://afhqrybiwnqbtflvlaxb.supabase.co", "sb_publishable_AkaheKqMC3QRoZrXlLUJzQ_3fcbiUCj");

var DAYS_AR   = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
var MONTHS_AR = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
var STATUS_LETTERS = { present:"ح", late:"م", excused:"س", absent:"غ" };
var STATUS_NAMES   = { present:"حاضر", late:"متأخر", excused:"مستأذن", absent:"غائب" };

function todayKey(){ return new Date().toISOString().slice(0,10); }
function formatDate(d){
  var dt = new Date(d+"T00:00:00");
  return DAYS_AR[dt.getDay()]+" • "+dt.getDate()+" "+MONTHS_AR[dt.getMonth()]+" "+dt.getFullYear();
}
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function key(id){ return String(id); }

// State
var students      = [];
var earlyToday    = new Set(); // IDs الذين أخذوا نقاط الحضور المبكر اليوم
var currentUserId = null;      // ID المستخدم الحالي
var todayRecords  = {};
var allDates      = [];
var supervisorName = "";
var currentClubId  = null;
var pendingCancelId = null;

document.getElementById("dayLabel").textContent = formatDate(todayKey());

// ══ INIT ══
function init(){
  SB.auth.getSession().then(function(r){
    if(!r.data || !r.data.session){
      window.location.replace("login.html");
      return;
    }
    var uid = r.data.session.user.id;
    currentUserId = uid;
    loadUser(uid);
  }).catch(function(e){
    console.error(e);
    hideLoading();
  });
}

function loadUser(uid){
  SB.from("supervisors").select("name,role,club_id").eq("user_id",uid).maybeSingle()
  .then(function(sup){
    if(sup.data){
      supervisorName = sup.data.name;
      currentClubId  = sup.data.club_id;
      var role = sup.data.role === "manager" ? "مدير برامج" : "مشرف النادي";
      document.getElementById("supervisorLabel").textContent = supervisorName;
    } else {
      return SB.from("profiles").select("name,role").eq("id",uid).maybeSingle()
      .then(function(prof){
        if(prof.data){
          supervisorName = prof.data.name;
          document.getElementById("supervisorLabel").textContent = supervisorName;
          if(prof.data.role === "admin") window._isAdmin = true;
        } else {
          supervisorName = "مشرف";
          document.getElementById("supervisorLabel").textContent = supervisorName;
        }
        return null;
      });
    }
    return null;
  })
  .then(function(){
    // جيب النادي
    if(currentClubId){
      // مشرف عادي مربوط بنادي
      return SB.from("clubs").select("name").eq("id",currentClubId).maybeSingle();
    } else if(window._isAdmin){
      // أدمن — جيب من sessionStorage
      var sessId = sessionStorage.getItem("adminClubId");
      if(sessId){
        currentClubId = sessId;
        return SB.from("clubs").select("name").eq("id",currentClubId).maybeSingle();
      } else {
        hideLoading();
        window.location.replace("clubs.html");
        return Promise.reject("no_club");
      }
    } else {
      // مشرف غير مربوط بنادي بعد
      document.getElementById("clubNameLabel").textContent = "لم يتم تحديد النادي بعد";
      hideLoading();
      return Promise.reject("no_club");
    }
  })
  .then(function(club){
    if(club && club.data){
      if(!currentClubId) currentClubId = club.data.id;
      document.getElementById("clubNameLabel").textContent = club.data.name;
      var sc = document.getElementById("sideClubName");
      if(sc) sc.textContent = club.data.name;
    }
    // جيب الطلاب
    var q = SB.from("students").select("id,name");
    if(currentClubId) q = q.eq("club_id", currentClubId);
    return q;
  })
  .then(function(studs){
    students = (studs.data||[]).sort(function(a,b){
      return a.name.localeCompare(b.name,"ar");
    });
    // جيب سجلات اليوم
    var q2 = SB.from("attendance_records").select("id,student_id,status").eq("date",todayKey());
    if(currentClubId) q2 = q2.eq("club_id", currentClubId);
    return q2;
  })
  .then(function(recs){
    todayRecords = {};
    (recs.data||[]).forEach(function(r){
      todayRecords[key(r.student_id)] = { status:r.status, record_id:r.id };
    });
    // جيب earlyStudentsSet
    if(currentClubId){
      SB.from("points").select("student_id").eq("date",todayKey()).eq("club_id",currentClubId)
      .then(function(pr){
        earlyStudentsSet = {};
        (pr.data||[]).forEach(function(p){ earlyStudentsSet[key(p.student_id)]=true; });
        render();
      }).catch(function(){});
    }
    // جيب من سبق له نقاط حضور مبكر اليوم (تستمر بعد إعادة التحميل)
    var qp = SB.from("points").select("student_id").eq("date", todayKey()).eq("type","early_attendance");
    if(currentClubId) qp = qp.eq("club_id", currentClubId);
    return qp.then(function(r){
      if(r.error){ console.error("points load error:", r.error); return {data:[]}; }
      return r;
    }).catch(function(e){ console.error("points load error:", e); return {data:[]}; });
  })
  .then(function(ptsRes){
    earlyToday = new Set((ptsRes && ptsRes.data || []).map(function(r){ return key(r.student_id); }));
    // جيب التواريخ
    var q3 = SB.from("attendance_records").select("date").order("date",{ascending:false});
    if(currentClubId) q3 = q3.eq("club_id", currentClubId);
    return q3;
  })
  .then(function(dates){
    var seen = {};
    allDates = [];
    (dates.data||[]).forEach(function(r){
      if(!seen[r.date]){ seen[r.date]=true; allDates.push(r.date); }
    });
    hideLoading();
    render();
    startRealtime();
  })
  .catch(function(e){
    console.error("loadUser error:", e);
    hideLoading();
    render();
  });
}

function hideLoading(){
  var ls = document.getElementById("loadingScreen");
  if(ls){ ls.classList.add("hide"); setTimeout(function(){ ls.style.display="none"; },400); }
}

// ══ Realtime ══
function startRealtime(){
  var attFilter = { event:"*", schema:"public", table:"attendance_records" };
  if(currentClubId) attFilter.filter = "club_id=eq."+currentClubId;
  SB.channel("athar-att")
  .on("postgres_changes", attFilter, function(payload){
    if(payload.eventType==="DELETE"){
      delete todayRecords[key(payload.old.student_id)];
    } else {
      var r = payload.new;
      if(r.date===todayKey()){
        todayRecords[key(r.student_id)] = { status:r.status, record_id:r.id };
        if(allDates.indexOf(r.date)===-1) allDates.unshift(r.date);
      }
    }
    render();
  })
  .on("postgres_changes",{ event:"*", schema:"public", table:"students" }, function(){
    var q = SB.from("students").select("id,name");
    if(currentClubId) q = q.eq("club_id",currentClubId);
    q.then(function(r){
      students = (r.data||[]).sort(function(a,b){ return a.name.localeCompare(b.name,"ar"); });
      render();
    });
  })
  .subscribe();
}

// ══ Toast ══
function showToast(text){
  var t = document.getElementById("toast");
  t.textContent = text;
  t.classList.add("show");
  clearTimeout(window._tt);
  window._tt = setTimeout(function(){ t.classList.remove("show"); }, 2400);
}

// ══ Render ══
function render(){
  var list  = document.getElementById("studentsList");
  var query = document.getElementById("searchInput").value.trim();
  list.innerHTML = "";

  var filtered = students.filter(function(s){
    return !query || s.name.indexOf(query) !== -1;
  });

  if(!filtered.length){
    list.innerHTML = '<div class="empty-state">'
      +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>'
      +'<p>'+(query?"لا توجد نتائج":"لا يوجد أعضاء في هذا النادي")+'</p></div>';
  } else {
    filtered.forEach(function(st){
      var rec    = todayRecords[key(st.id)];
      var status = rec ? rec.status : null;
      var card   = document.createElement("div");
      card.className = "student-card"+(status?" "+status:"");

      var isEarly = earlyToday.has(String(st.id));
      var earlyBadge = isEarly ? '<span class="early-badge">مبكر</span>' : '';

      var defaultHTML = '<div class="default-view" style="'+(status?"display:none":"")+'">'
        + earlyBadge
        +'<p class="default-name">'+esc(st.name)+'</p>'
        +'<div class="circles-row">';
      Object.keys(STATUS_LETTERS).forEach(function(s){
        defaultHTML += '<div class="circle" data-id="'+st.id+'" data-status="'+s+'">'+STATUS_LETTERS[s]+'</div>';
      });
      defaultHTML += '</div></div>';

      var selectedHTML = '<div class="selected-view" style="'+(status?"display:flex":"display:none")+'">'
        + (isEarly ? '<span class="early-badge">مبكر</span>' : '')
        +'<p class="selected-name">'+esc(st.name)+'</p>'
        +'<div class="status-badge" data-id="'+st.id+'">'+(status?STATUS_LETTERS[status]:"")+'</div>'
        +'</div>';

      card.innerHTML = defaultHTML + selectedHTML;
      var rec2 = todayRecords[key(st.id)];
      if(earlyStudentsSet[key(st.id)] && rec2 && rec2.status === "present"){
        var rib = document.createElement("div");
        rib.className = "early-ribbon";
        rib.innerHTML = '<svg viewBox="0 0 24 24" fill="#c99a2e" width="12" height="12"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>';
        card.appendChild(rib);
      }
      list.appendChild(card);
    });
    attachEvents();
  }

  // إحصائيات pills
  var counts = {present:0,late:0,excused:0,absent:0};
  Object.values(todayRecords).forEach(function(r){
    if(r && counts[r.status]!==undefined) counts[r.status]++;
  });
  document.getElementById("todayVal").textContent    = counts.present;
  document.getElementById("pillPresent").textContent = counts.present;
  document.getElementById("pillLate").textContent    = counts.late;
  document.getElementById("pillExcused").textContent = counts.excused;
  document.getElementById("pillAbsent").textContent  = counts.absent;
  

  // مؤشر اكتمال التحضير
  var hEl = document.getElementById("clubNameLabel");
  var total = Object.keys(todayRecords).length;
  if(students.length > 0 && total >= students.length){
    if(hEl.textContent.indexOf(" (حاضر)")===-1) hEl.textContent += " (حاضر)";
    hEl.style.color = "var(--present-text)";
  } else {
    hEl.textContent = hEl.textContent.replace(" (حاضر)","");
    hEl.style.color = "";
  }
}

function attachEvents(){
  document.querySelectorAll(".circle").forEach(function(c){
    c.onclick = function(){ setStatus(c.dataset.id, c.dataset.status); };
  });
  document.querySelectorAll(".status-badge").forEach(function(b){
    b.onclick = function(e){
      e.stopPropagation();
      pendingCancelId = b.dataset.id;
      var st = students.find(function(s){ return key(s.id)===key(b.dataset.id); });
      document.getElementById("cancelModalMsg").textContent =
        st ? ('إلغاء تحضير "'+st.name+'"؟') : "إلغاء التحضير؟";
      document.getElementById("cancelModal").classList.add("open");
    };
  });
}

// ══ setStatus — القلب ══
function setStatus(studentId, status){
  var existing = todayRecords[key(studentId)];

  if(status === null){
    if(!existing) return;
    SB.from("attendance_records").delete().eq("id", existing.record_id)
    .then(function(r){
      if(r.error){ showToast("⚠️ خطأ في الحذف"); return; }
      delete todayRecords[key(studentId)];
      if(earlyStudentsSet[key(studentId)]){
        SB.from("points").delete()
          .eq("student_id",studentId).eq("club_id",currentClubId).eq("date",todayKey())
        .then(function(){
          delete earlyStudentsSet[key(studentId)];
          render();
        });
      } else { render(); }
    });
  } else {
    if(existing){
      // تعديل حالة موجودة
      SB.from("attendance_records").update({ status: status }).eq("id", existing.record_id)
      .then(function(r){
        if(r.error){ showToast("⚠️ خطأ في التعديل"); return; }
        todayRecords[key(studentId)].status = status;
        var st = students.find(function(s){ return key(s.id)===key(studentId); });
        showToast(STATUS_NAMES[status]+(st?" — "+st.name:""));
        render();
      });
    } else {
      // إضافة سجل جديد
      SB.from("attendance_records")
      .insert({
        student_id   : studentId,
        club_id      : currentClubId,
        date         : todayKey(),
        status       : status,
        marked_by    : supervisorName || "مشرف"
      })
      .select("id")
      .then(function(r){
        if(r.error || !r.data || !r.data.length){
          console.error("insert error:", r.error);
          showToast("⚠️ تعذّر التسجيل");
          return;
        }
        todayRecords[key(studentId)] = { status: status, record_id: r.data[0].id };
        if(allDates.indexOf(todayKey())===-1) allDates.unshift(todayKey());
        var st = students.find(function(s){ return key(s.id)===key(studentId); });
        showToast(STATUS_NAMES[status]+(st?" — "+st.name:""));
        render();
      });
    }
  }
}

// ══ Modal إلغاء ══
document.getElementById("confirmCancelBtn").onclick = function(){
  if(pendingCancelId !== null) setStatus(pendingCancelId, null);
  document.getElementById("cancelModal").classList.remove("open");

  document.getElementById("addStudentModal").classList.add("open");

};

  }

  .then(function(r){

    var q = SB.from("students").select("id,name");
    if(currentClubId) q = q.eq("club_id",currentClubId);
    q.then(function(r2){
      students = (r2.data||[]).sort(function(a,b){ return a.name.localeCompare(b.name,"ar"); });
      render();
    });
  });
};

});

// ══ إدارة الأعضاء ══
var editingStudentId = null;
document.getElementById("manageStudentsBtn").onclick = function(){
  closeMenu();
  var list = document.getElementById("manageStudentsList");
  if(!students.length){
    list.innerHTML = "<p style='color:var(--muted);text-align:center;padding:20px;'>لا يوجد أعضاء</p>";
  } else {
    list.innerHTML = students.map(function(s){
      return '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);margin-bottom:6px;">'
        +'<span style="font-size:14px;font-weight:600;flex:1;">'+esc(s.name)+'</span>'
        +'<button onclick="openEditStudent(\''+s.id+'\',\''+esc(s.name)+'\')" style="background:var(--brand);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:\'Tajawal\',sans-serif;">تعديل</button>'
        +'</div>';

// ══ سجل الحضور ══
function renderAttendanceLog(){
  var log = document.getElementById("attendanceLog");
  log.innerHTML = '<p class="empty-log">جاري التحميل...</p>';
  var q = SB.from("attendance_records").select("date").order("date",{ascending:false});
  if(currentClubId) q = q.eq("club_id", currentClubId);
  q.then(function(r){
    var seen = {};
    var dates = [];
    (r.data||[]).forEach(function(rec){
      if(!seen[rec.date]){ seen[rec.date]=true; dates.push(rec.date); }
    });
    allDates = dates;
    if(!dates.length){
      log.innerHTML = '<p class="empty-log">لا يوجد سجل حتى الآن</p>';
      return;
    }
    var q2 = SB.from("attendance_records").select("date,status").in("date",dates.slice(0,30));
    if(currentClubId) q2 = q2.eq("club_id", currentClubId);
    q2.then(function(r2){
      var byDate = {};
      (r2.data||[]).forEach(function(rec){
        if(!byDate[rec.date]) byDate[rec.date]={present:0,late:0,excused:0,absent:0};
        byDate[rec.date][rec.status]=(byDate[rec.date][rec.status]||0)+1;
      });
      log.innerHTML = dates.slice(0,30).map(function(d){
        var s = byDate[d]||{};
        var isT = d===todayKey();
        return '<button class="menu-item" onclick="openDayDetail(\''+d+'\')">'
          +'<span style="font-size:13px;font-weight:'+(isT?'800':'500')+';">'+formatDate(d)+(isT?' 📍':'')+'</span>'
          +'<span style="font-size:12px;display:flex;gap:4px;">'
          +'<span style="color:var(--present-text);">ح'+(s.present||0)+'</span>'
          +'<span style="color:var(--late-text);">م'+(s.late||0)+'</span>'
          +'<span style="color:var(--excused-text);">س'+(s.excused||0)+'</span>'
          +'<span style="color:var(--absent-text);">غ'+(s.absent||0)+'</span>'
          +'</span></button>';
      }).join("");
    });
  });
}

// ══ تفاصيل يوم ══
function openDayDetail(dateStr){
  var q = SB.from("attendance_records").select("student_id,status,created_at").eq("date",dateStr);
  if(currentClubId) q = q.eq("club_id", currentClubId);
  q.then(function(r){
    document.getElementById("dayDetailTitle").textContent = formatDate(dateStr);
    var grouped = {present:[],late:[],excused:[],absent:[]};
    (r.data||[]).forEach(function(rec){
      var st = students.find(function(s){ return key(s.id)===key(rec.student_id); });
      if(st && grouped[rec.status]){
        var t = rec.created_at ? new Date(rec.created_at).toLocaleTimeString("ar-SA",{hour:"2-digit",minute:"2-digit",hour12:true}) : "";
        grouped[rec.status].push({name:st.name, time:t});
      }
    });
    var colors = {
      present:{bg:"var(--present-bg)",border:"var(--present-border)",text:"var(--present-text)"},
      late:   {bg:"var(--late-bg)",   border:"var(--late-border)",   text:"var(--late-text)"},
      excused:{bg:"var(--excused-bg)",border:"var(--excused-border)",text:"var(--excused-text)"},
      absent: {bg:"var(--absent-bg)", border:"var(--absent-border)", text:"var(--absent-text)"}
    };
    var STATUS_NAMES_AR = {present:"حاضر",late:"متأخر",excused:"مستأذن",absent:"غائب"};
    var content = document.getElementById("dayDetailContent");
    var html = "";
    Object.keys(grouped).forEach(function(status){
      var items = grouped[status];
      if(!items.length) return;
      var c = colors[status];
      html += '<div style="background:'+c.bg+';border:1.5px solid '+c.border+';border-radius:12px;padding:12px 14px;margin-bottom:8px;">'
        +'<p style="margin:0 0 8px;font-weight:800;font-size:13px;color:'+c.text+';">'+STATUS_NAMES_AR[status]+' ('+items.length+')</p>';
      items.forEach(function(i){
        html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;">'
          +'<p style="margin:0;font-size:14px;color:'+c.text+';">• '+esc(i.name)+'</p>'
          +(i.time?'<span style="font-size:11px;color:'+c.text+';opacity:.65;">'+i.time+'</span>':"")
          +'</div>';
      });
      html += '</div>';
    });
    content.innerHTML = html || '<p style="color:var(--muted);text-align:center;padding:20px;">لا يوجد بيانات</p>';
    document.getElementById("dayDetailModal").classList.add("open");
    closeMenu();
  });
}
document.getElementById("closeDayDetail").onclick = function(){
  document.getElementById("dayDetailModal").classList.remove("open");
};

// ══ CUSTOM TIME PICKER ══
var earlyHour12 = 7;       // 1-12
var earlyMin    = 30;      // 0/15/30/45
var earlyPeriod = "م";     // ص = صباحاً, م = مساءً (الافتراضي مساءً)

function pad(n){ return String(n).padStart(2,"0"); }

function saveEarlySettings(){
  if(!currentClubId) return;
  SB.from("club_settings").upsert({
    club_id:currentClubId, early_hour:earlyHour12,
    early_min:earlyMin, early_period:earlyPeriod, early_pts:earlyPts
  },{onConflict:"club_id"}).then(function(){});
}
function loadEarlySettings(){
  if(!currentClubId) return;
  SB.from("club_settings").select("*").eq("club_id",currentClubId).maybeSingle()
  .then(function(r){
    if(!r.data) return;
    earlyHour12 = r.data.early_hour||7;
    earlyMin    = r.data.early_min||0;
    earlyPeriod = r.data.early_period||"م";
    earlyPts    = r.data.early_pts||15;
    document.getElementById("hourVal").textContent = pad(earlyHour12);
    document.getElementById("minVal").textContent  = pad(earlyMin);
    document.querySelectorAll(".period-btn").forEach(function(b){ b.classList.toggle("active",b.dataset.p===earlyPeriod); });
    document.querySelectorAll(".early-pt-btn").forEach(function(b){ b.classList.toggle("selected",parseInt(b.dataset.pts)===earlyPts); });
  }).catch(function(){});
}
function changeHour(d){
  earlyHour12 = ((earlyHour12 - 1 + d + 12) % 12) + 1;
  document.getElementById("hourVal").textContent = pad(earlyHour12);
  saveEarlySettings();
}
function changeMin(d){
  earlyMin = (earlyMin + d*15 + 60) % 60;
  document.getElementById("minVal").textContent = pad(earlyMin);
  saveEarlySettings();
}
function to24Hour(h12, period){
  if(period === "ص") return h12 === 12 ? 0 : h12;
  return h12 === 12 ? 12 : h12 + 12;
}

// ══ EARLY ATTENDANCE ══
var earlyPts = 15; // النقاط المختارة

// فتح مودال الحضور المبكر
document.getElementById("earlyAttendanceBtn").onclick = function(){

};

// إغلاق بالضغط خارج المودال
document.getElementById("earlyModal").onclick = function(e){
  if(e.target === this) this.classList.remove("open");
};

// تطبيق نقاط الحضور المبكر
document.getElementById("earlyConfirmBtn").onclick = function(){
  var timeVal = pad(to24Hour(earlyHour12, earlyPeriod)) + ":" + pad(earlyMin);
  var btn = document.getElementById("earlyConfirmBtn");
  btn.disabled = true;
  btn.textContent = "جاري التطبيق...";

  var today = new Date().toISOString().slice(0,10);
  var cutoff = today + "T" + timeVal + ":00";

  // جيب الحاضرين اليوم
  SB.from("attendance_records")
    .select("student_id,created_at")
    .eq("date", today).eq("status","present").eq("club_id", currentClubId)
  .then(function(attRes){
    if(attRes.error){ showToast("خطأ في جلب البيانات"); btn.disabled=false; btn.textContent="تفعيل نقاط الحضور المبكر"; return; }

    // جيب من أخذ نقاط اليوم
    SB.from("points").select("student_id").eq("date",today).eq("club_id",currentClubId)
    .then(function(ptsRes){
      var alreadyGot = {};
      (ptsRes.data||[]).forEach(function(p){ alreadyGot[String(p.student_id)]=true; });

      var toInsert = (attRes.data||[])
        .filter(function(r){ return r.created_at && r.created_at < cutoff && !alreadyGot[String(r.student_id)]; })
        .map(function(r){ return { student_id:r.student_id, club_id:currentClubId, points:earlyPts, type:"حضور مبكر", reason:"حضور مبكر", date:today }; });

      if(!toInsert.length){
        showToast("لا يوجد حاضرون مبكرون غير محسوبين");
        btn.disabled=false; btn.textContent="تفعيل نقاط الحضور المبكر";
        return;
      }

      SB.from("points").insert(toInsert).then(function(insRes){
        btn.disabled=false; btn.textContent="تفعيل نقاط الحضور المبكر";
        if(insRes.error){ showToast("خطأ في إضافة النقاط"); return; }
        toInsert.forEach(function(r){ earlyStudentsSet[String(r.student_id)]=true; });
        render();
        document.getElementById("earlyModal").classList.remove("open");
        showToast("تمت إضافة " + earlyPts + " نقطة لـ " + toInsert.length + " عضو");
      });
    });
  });
};
